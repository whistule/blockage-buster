<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blockage Buster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #e5e7eb; font-family: 'Plus Jakarta Sans', sans-serif; color: #4b5563; }
  body { margin: 0 auto; background: #f5f7fa; min-height: 100vh; }

  /* ── TOP BAR ── */
  .bb-topbar {
    background: #f9fafb; padding: 1.25rem 1.5rem 1rem;
    display: flex; align-items: center; gap: 0.75rem;
    border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 10;
  }
  .bb-topbar--main { flex-wrap: wrap; }
  .bb-topbar-back {
    font-size: 1.5rem; cursor: pointer; color: #4b5563;
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  }
  .bb-logo {
    width: 48px; height: 52px; flex-shrink: 0;
  }
  .bb-topbar-brand { flex: 1; }
  .bb-topbar-title {
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    font-size: 2rem; font-weight: 700;
    letter-spacing: 0.02em; line-height: 1.1;
    text-transform: uppercase;
  }
  .bb-topbar-mk { color: #1f2937; }
  .bb-topbar-app { color: #e20e0c; }
  .bb-topbar-sub {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.7rem; color: #9ca3af;
    text-transform: lowercase; letter-spacing: 0.15em;
    margin-top: 0.1rem;
  }
  .bb-topbar-rule {
    height: 3px; background: #e20e0c; width: 100%;
    position: absolute; bottom: 0; left: 0;
  }
  .bb-topbar--main { position: relative; padding-bottom: 1.25rem; }
  .bb-topbar-title--sub {
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    color: #4b5563; font-size: 1.2rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.02em; flex: 1;
  }

  /* View toggle */
  .bb-view-toggle {
    display: flex; gap: 0; border: 1px solid #d1d5db; border-radius: 4px; overflow: hidden;
  }
  .bb-view-toggle-btn {
    padding: 0.35rem 0.75rem; font-size: 0.7rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    cursor: pointer; background: white; color: #6b7280;
    border: none; border-right: 1px solid #d1d5db;
    transition: background 0.15s, color 0.15s;
  }
  .bb-view-toggle-btn:last-child { border-right: none; }
  .bb-view-toggle-btn--active { background: #4b5563; color: white; }

  /* ── TABS (mobile) ── */
  .bb-tabs {
    display: flex; background: #f3f4f6; border-bottom: 1px solid #e5e7eb;
    overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none;
    position: sticky; top: 52px; z-index: 9;
  }
  .bb-tabs::-webkit-scrollbar { display: none; }
  .bb-tab {
    flex: none; padding: 0.7rem 1rem; font-size: 0.75rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: #6b7280; cursor: pointer; white-space: nowrap;
    border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s;
  }
  .bb-tab--active { color: #4b5563; border-bottom-color: #4b5563; }
  .bb-tab--add { color: #9ca3af; font-weight: 500; }
  .bb-tab-count {
    display: inline-block; margin-left: 0.35rem;
    background: #e5e7eb; color: #4b5563; font-size: 0.65rem; font-weight: 700;
    padding: 1px 6px; border-radius: 8px;
  }
  .bb-tab--active .bb-tab-count { background: #4b5563; color: white; }

  /* ── CARD ── */
  .bb-cardlist { padding: 0.75rem 1rem; }
  .bb-card {
    background: white; border: 1px solid #d1d5db;
    box-shadow: inset 1px 1px 2px rgba(0,0,0,0.06);
    margin-bottom: 10px;
    cursor: pointer; transition: background 0.15s;
    display: flex; overflow: hidden;
  }
  .bb-card:active { background: #f9fafb; }

  /* Left info stripe */
  .bb-card-stripe {
    width: 28px; min-width: 28px; flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 6px 0;
    position: relative;
  }
  .bb-card-stripe-text {
    writing-mode: vertical-rl; text-orientation: mixed;
    font-size: 0.55rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: white; white-space: nowrap;
  }
  .bb-card-stripe-num { transform: rotate(180deg); }
  .bb-card-stripe-name { transform: rotate(180deg); }

  .bb-card-body { padding: 12px 14px; flex: 1; min-width: 0; }

  .bb-card-img {
    width: 64px; min-width: 64px; height: 64px;
    object-fit: cover; border-radius: 4px;
    margin: auto 14px auto 0; flex-shrink: 0;
    background: #e5e7eb;
  }

  .bb-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.35rem; }
  .bb-card-num { font-size: 0.75rem; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.04em; }
  .bb-card-bell { font-size: 0.7rem; color: #6b7280; margin-left: auto; margin-right: 0.5rem; }
  .bb-card-title { font-size: 1.05rem; font-weight: 600; color: #4b5563; margin-bottom: 0.3rem; }
  .bb-card-desc { font-size: 0.9rem; color: #6b7280; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.6rem; }
  .bb-card-meta { display: flex; flex-direction: column; gap: 0.2rem; }
  .bb-card-meta-row { display: flex; gap: 0.3rem; align-items: baseline; }
  .bb-card-label { font-size: 0.75rem; font-weight: 500; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
  .bb-card-value { font-size: 0.9rem; font-weight: 500; color: #4b5563; }

  /* ── PILLS ── */
  .bb-pill { display: inline-block; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 4px; color: white; white-space: nowrap; }
  .bb-pill--urgent { background: #ef4444; }
  .bb-pill--high { background: #f97316; }
  .bb-pill--medium { background: #22c55e; }
  .bb-pill--low { background: #9ca3af; }

  /* Stage pill on card (shown in person view) */
  .bb-card-stage-pill {
    display: inline-block; font-size: 0.6rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.03em;
    padding: 2px 7px; border-radius: 3px;
    background: #f3f4f6; color: #6b7280; margin-left: 0.4rem;
  }

  /* ── DESKTOP COLUMNS ── */
  .bb-columns { display: none; }
  .bb-column { background: #f3f4f6; min-height: 300px; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; }
  .bb-column:last-child { border-right: none; }
  .bb-col-header { padding: 0.75rem 1rem; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 0.5rem; position: sticky; top: 52px; z-index: 8; background: #f3f4f6; }
  .bb-col-title { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #4b5563; }
  .bb-col-count { background: #4b5563; color: white; font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 8px; }
  .bb-col-stripe { width: 4px; height: 16px; border-radius: 2px; }
  .bb-col-stripe--flagged { background: #7a8a78; }
  .bb-col-stripe--onus { background: #3d6640; }
  .bb-col-stripe--onthem { background: #c4622d; }
  .bb-col-stripe--resolved { background: #0098a0; }
  .bb-col-stripe--person { background: #4b5563; }
  .bb-col-cards { padding: 0.5rem; flex: 1; overflow-y: auto; }

  @media (min-width: 768px) {
    body { max-width: 100%; }
    .bb-tabs { display: none !important; }
    .bb-cardlist { display: none !important; }
    .bb-columns { display: grid !important; flex: 1; min-height: calc(100vh - 52px); }
    .bb-detail { max-width: 680px; margin: 0 auto; }
  }
  @media (max-width: 767px) {
    body { max-width: 430px; }
    .bb-columns { display: none !important; }
  }

  /* ── VIEWS ── */
  .bb-view { display: none; }
  .bb-view--active { display: block; }

  /* ── DETAIL VIEW ── */
  .bb-detail { padding: 0 1rem 2rem; }
  .bb-detail-top { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .bb-detail-num { font-size: 0.85rem; font-weight: 700; color: #9ca3af; }
  .bb-state { background: #1f2937; color: #10b981; padding: 0.3rem 0.7rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 3px; }
  .bb-heading { font-size: 0.875rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 0.4rem; margin-bottom: 0.75rem; border-bottom: 1px solid #9ca3af; margin-top: 1.5rem; }
  .bb-heading:first-child { margin-top: 0; }
  .bb-desc { font-size: 0.95rem; color: #4b5563; line-height: 1.5; margin-bottom: 0.75rem; }

  /* Editable fields */
  .bb-edit-input {
    width: 100%; font-family: 'Oswald', sans-serif; font-size: 1.25rem; font-weight: 600;
    color: #1f2937; background: transparent; border: none; border-bottom: 2px solid #e5e7eb;
    padding: 0.4rem 0; outline: none; letter-spacing: 0.02em;
  }
  .bb-edit-input:focus { border-bottom-color: #e20e0c; }
  .bb-edit-textarea {
    width: 100%; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem;
    color: #4b5563; background: transparent; border: none; border-bottom: 2px solid #e5e7eb;
    padding: 0.4rem 0; outline: none; resize: vertical; min-height: 4rem; line-height: 1.5;
  }
  .bb-edit-textarea:focus { border-bottom-color: #e20e0c; }
  .bb-edit-select {
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
    color: #1f2937; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 4px;
    padding: 0.4rem 0.6rem; outline: none; cursor: pointer;
  }
  .bb-edit-select:focus { border-color: #e20e0c; }
  .bb-edit-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .bb-edit-field { flex: 1; min-width: 140px; }
  .bb-edit-label { font-size: 0.7rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.25rem; }
  .bb-btn--save { border-color: #16a34a; color: #16a34a; }
  .bb-btn--save:active { background: #dcfce7; }

  /* Timeline */
  .bb-timeline { position: relative; padding-left: 2.5rem; }
  .bb-timeline::before { content: ''; position: absolute; left: 0.75rem; top: 0.75rem; bottom: 0.75rem; width: 1px; background: #e5e7eb; }
  .bb-stage { position: relative; padding: 0.5rem 0 1rem; }
  .bb-stage:last-child { padding-bottom: 0; }
  .bb-stage-led { position: absolute; left: -1.75rem; top: 0.35rem; width: 1.25rem; height: 1.25rem; border-radius: 50%; border: 1px solid #6b7280; box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,255,0.3); background: linear-gradient(135deg, #f9fafb 0%, #e5e7eb 100%); }
  .bb-stage--done .bb-stage-led { background: linear-gradient(135deg, #86efac 0%, #16a34a 100%); }
  .bb-stage--now .bb-stage-led { background: linear-gradient(135deg, #fdba74 0%, #ea580c 100%); width: 1.5rem; height: 1.5rem; left: -1.875rem; top: 0.2rem; }
  .bb-stage-head { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; cursor: pointer; }
  .bb-stage-date { font-size: 0.8rem; font-weight: 600; color: #4b5563; }
  .bb-stage-name { font-size: 0.95rem; font-weight: 500; color: #4b5563; }
  .bb-stage-person { font-size: 0.85rem; font-weight: 400; color: #6b7280; }
  .bb-stage-now-pill { background: #1f2937; color: #10b981; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; }
  .bb-stage--upcoming .bb-stage-name, .bb-stage--upcoming .bb-stage-person { opacity: 0.5; }
  .bb-stage-body { display: none; margin-top: 0.5rem; }
  .bb-stage-body--open { display: block; }
  .bb-stage-note { font-size: 0.85rem; color: #4b5563; font-style: italic; margin-bottom: 0.35rem; line-height: 1.4; }
  .bb-stage-note-date { font-style: normal; font-weight: 600; color: #6b7280; }
  .bb-stage-link { font-size: 0.85rem; font-weight: 500; color: #3d6640; text-decoration: underline; display: block; margin-bottom: 0.25rem; cursor: pointer; }
  .bb-stage-link::before { content: '🔗 '; font-size: 0.75rem; }
  .bb-stage-actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; }
  .bb-stage-action { font-size: 0.8rem; color: #9ca3af; cursor: pointer; }

  /* Buttons */
  .bb-btn { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1rem; background: white; border: 1px solid #9ca3af; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; box-shadow: 1px 1px 2px rgba(0,0,0,0.1); transition: background 0.15s; margin-top: 0.75rem; }
  .bb-btn:active { background: #e5e7eb; }
  .bb-btn-indicator { width: 1rem; height: 2rem; flex-shrink: 0; border: 1px solid #6b7280; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2); }
  .bb-btn-indicator--green { background: #84cc16; }
  .bb-btn-indicator--yellow { background: #facc15; }

  /* Reminders */
  .bb-reminders { margin-top: 0.5rem; }
  .bb-reminder-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.6rem 0; border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; }
  .bb-reminder-bell { font-size: 0.9rem; color: #6b7280; }
  .bb-reminder-date { font-weight: 600; color: #4b5563; white-space: nowrap; }
  .bb-reminder-to { color: #6b7280; flex: 1; }
  .bb-reminder-x { color: #9ca3af; cursor: pointer; padding: 0.25rem; }

  .bb-empty { text-align: center; padding: 3rem 1rem; font-size: 0.95rem; color: #9ca3af; }

  /* Column add button */
  .bb-col-add {
    margin-left: auto; width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700; color: #9ca3af;
    cursor: pointer; border-radius: 4px;
    transition: background 0.15s, color 0.15s;
  }
  .bb-col-add:hover { background: #e5e7eb; color: #4b5563; }

  /* Mobile add button in tab bar */
  .bb-tab-add-card {
    margin-left: auto; padding: 0.5rem 1rem;
    font-size: 1.1rem; font-weight: 700; color: #9ca3af;
    cursor: pointer;
  }

  /* New card modal */
  .bb-modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 50;
    align-items: center; justify-content: center;
  }
  .bb-modal-overlay--open { display: flex; }
  .bb-modal {
    background: white; width: 90%; max-width: 420px;
    max-height: 85vh; overflow-y: auto;
    padding: 1.5rem; position: relative;
  }
  .bb-modal-title {
    font-family: 'Oswald', sans-serif; font-size: 1.2rem; font-weight: 700;
    text-transform: uppercase; color: #4b5563; margin-bottom: 1rem;
  }
  .bb-modal-close {
    position: absolute; top: 1rem; right: 1rem;
    font-size: 1.2rem; color: #9ca3af; cursor: pointer;
  }
  .bb-form-group { margin-bottom: 1rem; }
  .bb-form-label {
    display: block; font-size: 0.7rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: #6b7280; margin-bottom: 0.35rem;
  }
  .bb-form-input, .bb-form-select, .bb-form-textarea {
    width: 100%; padding: 0.6rem 0.75rem;
    border: 1px solid #d1d5db; background: white;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem;
    color: #4b5563;
  }
  .bb-form-input:focus, .bb-form-select:focus, .bb-form-textarea:focus {
    outline: none; border-color: #4b5563;
  }
  .bb-form-textarea { min-height: 80px; resize: vertical; }

  /* Delete button */
  .bb-btn--delete { border-color: #ef4444; color: #ef4444; margin-top: 2rem; }
  .bb-btn--delete:active { background: #fde8e8; }

  /* Toast */
  .bb-toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #1f2937; color: #10b981; padding: 0.6rem 1.25rem; font-size: 0.85rem; font-weight: 600; border-radius: 4px; letter-spacing: 0.03em; z-index: 100; animation: bbToastIn 0.2s ease-out, bbToastOut 0.3s 1.7s ease-in forwards; }
  @keyframes bbToastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
  @keyframes bbToastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ -->
<!--              NEW CARD MODAL                     -->
<!-- ═══════════════════════════════════════════════ -->

<div class="bb-modal-overlay" id="bbNewCardModal">
  <div class="bb-modal">
    <div class="bb-modal-close" onclick="closeNewCard()">✕</div>
    <div class="bb-modal-title">New Buster Card</div>

    <div class="bb-form-group">
      <label class="bb-form-label">Title</label>
      <input class="bb-form-input" id="ncTitle" type="text" placeholder="Short name for the blockage">
    </div>

    <div class="bb-form-group">
      <label class="bb-form-label">Description</label>
      <textarea class="bb-form-textarea" id="ncDesc" placeholder="What's blocked and why?"></textarea>
    </div>

    <div class="bb-form-group">
      <label class="bb-form-label">Stage</label>
      <select class="bb-form-select" id="ncStage">
        <option value="flagged">Flagged</option>
        <option value="onus">On Us</option>
        <option value="onthem">On Them</option>
        <option value="sticky">Sticky</option>
        <option value="onhold">On Hold</option>
        <option value="busted">Busted</option>
      </select>
    </div>

    <div class="bb-form-group">
      <label class="bb-form-label">Stuck with</label>
      <select class="bb-form-select" id="ncPerson"></select>
    </div>

    <div class="bb-form-group">
      <label class="bb-form-label">Urgency</label>
      <select class="bb-form-select" id="ncUrgency">
        <option value="medium">Medium</option>
        <option value="low">Low</option>
        <option value="high">High Priority</option>
        <option value="urgent">Urgent</option>
      </select>
    </div>

    <div class="bb-btn" onclick="saveNewCard()">
      <div class="bb-btn-indicator bb-btn-indicator--green"></div>
      Create Buster Card
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!--              KANBAN BOARD                       -->
<!-- ═══════════════════════════════════════════════ -->

<div class="bb-view bb-view--active" id="bbBoard">

  <div class="bb-topbar bb-topbar--main">
    <a id="homeBtn" title="Watchtower Dashboard" style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:1px solid #e5e7eb;background:#fff;text-decoration:none;cursor:pointer;border-radius:3px;flex-shrink:0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;color:#9ca3af">
        <path d="M8 22L10 10h4L16 22"/><rect x="9" y="7" width="6" height="3" rx="0.5"/><path d="M9 7L12 4L15 7"/>
        <path d="M15 8.5L20 5M15 8.5L20 8.5M15 8.5L20 12" style="opacity:0.4;stroke:#e20e0c;stroke-width:1.5"/><circle cx="12" cy="14" r="1"/>
      </svg>
    </a>
    <div class="bb-topbar-brand">
      <div class="bb-topbar-title"><span class="bb-topbar-mk">MK</span><span class="bb-topbar-app">BLOCKAGE BUSTER</span></div>
      <div class="bb-topbar-sub">workshop app dashboard</div>
    </div>
    <div class="bb-view-toggle">

      <div class="bb-view-toggle-btn bb-view-toggle-btn--active" onclick="setViewMode('stage')">Stage</div>
      <div class="bb-view-toggle-btn" onclick="setViewMode('person')">Person</div>
      <div class="bb-view-toggle-btn" onclick="setViewMode('supplier')">Supplier</div>
      <div class="bb-view-toggle-btn" onclick="setViewMode('urgency')">Urgency</div>
    </div>
    <div class="bb-topbar-rule"></div>
  </div>

  <!-- ─── MOBILE TABS ─── -->
  <div class="bb-tabs" id="bbTabs"></div>

  <!-- ─── MOBILE CARD LIST ─── -->
  <div class="bb-cardlist" id="bbMobileCards"></div>

  <!-- ─── DESKTOP COLUMNS ─── -->
  <div class="bb-columns" id="bbDesktopCols"></div>

</div>

<!-- ═══════════════════════════════════════════════ -->
<!--              DETAIL VIEW                        -->
<!-- ═══════════════════════════════════════════════ -->

<div class="bb-view" id="bbDetail">
  <div class="bb-topbar">
    <div class="bb-topbar-back" onclick="showBoard()">&#8592;</div>
    <div class="bb-topbar-title bb-topbar-title--sub" id="bbDetailTitle"></div>
  </div>
  <div class="bb-detail" id="bbDetailContent"></div>
</div>

<script>
(function() {

  // ── SUPABASE ──
  var SUPABASE_URL = 'https://pmckcosionpaioiazmlm.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_i-a8_NabfzPy5rh1S82gHw_VtzB1K23';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── DATA ──
  var cards = [];
  var contactsMap = {}; // id → { name, type, color }
  var personColors = {};
  var defaultPersonColor = '#6b7280';

  var viewMode = 'stage';
  var activeTab = null;
  var urgencyOrder = { urgent: 0, high: 1, medium: 2, low: 3, '': 4 };

  var stageLabels = { flagged: 'Flagged', onus: 'On Us', onthem: 'On Them', sticky: 'Sticky', onhold: 'On Hold', busted: 'Busted' };
  var stageColors = { flagged: '#7a8a78', onus: '#3d6640', onthem: '#c4622d', sticky: '#a855f7', onhold: '#6b7280', busted: '#0098a0' };
  var stageOrder = ['flagged', 'onus', 'onthem', 'sticky', 'onhold', 'busted'];

  // ── LOAD FROM SUPABASE ──
  async function loadData() {
    // Load contacts
    var { data: contacts } = await sb.from('contacts').select('*');
    if (contacts) {
      contacts.forEach(function(c) {
        contactsMap[c.id] = c;
        personColors[c.name] = c.color;
      });
    }

    // Load cards with their current stage (from stages table)
    var { data: dbCards } = await sb.from('cards').select('*, contacts(name, type, color)').order('buster_num');

    // Load stages for current step display
    var { data: stages } = await sb.from('stages').select('*').eq('status', 'now');
    var nowStageByCard = {};
    if (stages) {
      stages.forEach(function(s) { nowStageByCard[s.card_id] = s; });
    }

    // Load reminders (pending)
    var { data: reminders } = await sb.from('reminders').select('*').eq('sent', false);
    var reminderByCard = {};
    if (reminders) {
      reminders.forEach(function(r) { reminderByCard[r.card_id] = true; });
    }

    if (dbCards) {
      cards = dbCards.map(function(c) {
        var contact = c.contacts || {};
        var nowStage = nowStageByCard[c.id];
        return {
          id: String(c.buster_num).padStart(3, '0'),
          dbId: c.id,
          title: c.title,
          desc: c.description || '',
          stage: c.stage,
          person: contact.name || 'Unassigned',
          type: contact.type || 'internal',
          urgency: c.urgency || '',
          currentStep: nowStage ? nowStage.name : '—',
          hasReminder: !!reminderByCard[c.id],
          img: c.image_url || '',
          isSticky: c.is_sticky
        };
      });
    }

    render();
  }

  // ── RENDER CARD HTML ──
  function cardHTML(c, showStage) {
    var pillCls = c.urgency ? 'bb-pill--' + c.urgency : 'bb-pill--low';
    var pillText = c.urgency === 'urgent' ? 'Urgent' : c.urgency === 'high' ? 'High Priority' : c.urgency === 'medium' ? 'Medium' : c.stage === 'resolved' ? 'Resolved' : 'Low';
    var bell = c.hasReminder ? '<span class="bb-card-bell">🔔</span>' : '';

    // Stripe always shows person colour
    var borderColor = personColors[c.person] || defaultPersonColor;
    if (c.urgency === 'urgent') borderColor = '#ef4444';

    // Stripe text: always person name at bottom, card number at top
    var stripeName = c.person;

    var meta = '<div class="bb-card-meta">';
    meta += '<div class="bb-card-meta-row"><span class="bb-card-label">Stage: </span><span class="bb-card-value">' + c.currentStep + '</span></div>';
    if (showStage) {
      meta += '<div class="bb-card-meta-row"><span class="bb-card-label">Status: </span><span class="bb-card-stage-pill" style="border-left:3px solid ' + stageColors[c.stage] + ';padding-left:6px;">' + stageLabels[c.stage] + '</span></div>';
    }
    meta += '</div>';

    var imgHTML = c.img ? '<img class="bb-card-img" src="' + c.img + '" alt="">' : '';

    return '<div class="bb-card" onclick="showDetail(\'' + c.id + '\')">' +
      '<div class="bb-card-stripe" style="background:' + borderColor + ';">' +
        '<span class="bb-card-stripe-text bb-card-stripe-num">#' + c.id + '</span>' +
        '<span class="bb-card-stripe-text bb-card-stripe-name">' + stripeName + '</span>' +
      '</div>' +
      '<div class="bb-card-body">' +
        '<div class="bb-card-top"><span class="bb-card-num">#' + c.id + '</span>' + bell + '<span class="bb-pill ' + pillCls + '">' + pillText + '</span></div>' +
        '<div class="bb-card-title">' + c.title + '</div>' +
        '<div class="bb-card-desc">' + c.desc + '</div>' +
        meta +
      '</div>' +
      imgHTML +
    '</div>';
  }

  var urgencyLabels = { urgent: 'Urgent', high: 'High Priority', medium: 'Medium', low: 'Low', '': 'None' };
  var urgencyColors = { urgent: '#ef4444', high: '#f97316', medium: '#22c55e', low: '#9ca3af', '': '#d1d5db' };
  var urgencyGroupOrder = ['urgent', 'high', 'medium', 'low', ''];

  // ── GET GROUPS ──
  function getGroups() {
    var groups = {};
    var order = [];
    var filtered = cards;

    // Filter by type for person/supplier views
    if (viewMode === 'person') {
      filtered = cards.filter(function(c) { return c.type === 'internal'; });
    } else if (viewMode === 'supplier') {
      filtered = cards.filter(function(c) { return c.type === 'external'; });
    }

    if (viewMode === 'urgency') {
      // Use fixed order for urgency groups
      urgencyGroupOrder.forEach(function(u) { groups[u] = []; order.push(u); });
      filtered.forEach(function(c) {
        var key = c.urgency || '';
        groups[key].push(c);
      });
      // Remove empty groups
      order = order.filter(function(k) { return groups[k].length > 0; });
    } else if (viewMode === 'stage') {
      // Always show all stage columns in fixed order
      stageOrder.forEach(function(s) { groups[s] = []; order.push(s); });
      filtered.forEach(function(c) {
        var key = c.stage;
        if (!groups[key]) { groups[key] = []; order.push(key); }
        groups[key].push(c);
      });
    } else {
      filtered.forEach(function(c) {
        var key = c.person;
        if (!groups[key]) { groups[key] = []; order.push(key); }
        groups[key].push(c);
      });
    }

    // Sort cards within each group by urgency
    order.forEach(function(k) {
      groups[k].sort(function(a, b) { return (urgencyOrder[a.urgency] || 4) - (urgencyOrder[b.urgency] || 4); });
    });
    return { groups: groups, order: order };
  }

  // ── RENDER BOARD ──
  function render() {
    var data = getGroups();
    var groups = data.groups;
    var order = data.order;

    // Toggle buttons
    var modeMap = { 'stage': 'Stage', 'person': 'Person', 'supplier': 'Supplier', 'urgency': 'Urgency' };
    document.querySelectorAll('.bb-view-toggle-btn').forEach(function(b) {
      b.classList.toggle('bb-view-toggle-btn--active', b.textContent.trim() === modeMap[viewMode]);
    });

    // Set first tab if needed
    if (!activeTab || !groups[activeTab]) activeTab = order[0];

    // ── Mobile tabs ──
    var tabsEl = document.getElementById('bbTabs');
    var tabsHTML = '';
    order.forEach(function(key) {
      var active = key === activeTab ? ' bb-tab--active' : '';
      var label;
      if (viewMode === 'stage') label = stageLabels[key] || key;
      else if (viewMode === 'urgency') label = urgencyLabels[key] || key;
      else label = key;
      tabsHTML += '<div class="bb-tab' + active + '" data-key="' + key + '">' + label + ' <span class="bb-tab-count">' + groups[key].length + '</span></div>';
    });
    if (viewMode === 'stage') tabsHTML += '<div class="bb-tab bb-tab--add">+ Column</div>';
    // Add card button for mobile (in current tab)
    if (viewMode === 'stage' && activeTab && activeTab !== 'busted') {
      tabsHTML += '<div class="bb-tab-add-card" onclick="openNewCard(\'' + activeTab + '\')">+</div>';
    }
    tabsEl.innerHTML = tabsHTML;

    // Wire tab clicks
    tabsEl.querySelectorAll('.bb-tab[data-key]').forEach(function(t) {
      t.onclick = function() {
        activeTab = t.getAttribute('data-key');
        render();
      };
    });

    // ── Mobile cards ──
    var mobileEl = document.getElementById('bbMobileCards');
    var showStage = (viewMode === 'person' || viewMode === 'supplier');
    if (groups[activeTab]) {
      mobileEl.innerHTML = groups[activeTab].map(function(c) { return cardHTML(c, showStage); }).join('');
    } else {
      mobileEl.innerHTML = '<div class="bb-empty">No blockages here</div>';
    }

    // ── Desktop columns ──
    var colsEl = document.getElementById('bbDesktopCols');
    colsEl.style.gridTemplateColumns = 'repeat(' + order.length + ', 1fr)';
    var colsHTML = '';
    order.forEach(function(key) {
      var label, stripeStyle;
      if (viewMode === 'stage') {
        label = stageLabels[key] || key;
        stripeStyle = 'background:' + (stageColors[key] || '#7a8a78');
      } else if (viewMode === 'urgency') {
        label = urgencyLabels[key] || key;
        stripeStyle = 'background:' + (urgencyColors[key] || '#9ca3af');
      } else if (viewMode === 'person') {
        label = key;
        stripeStyle = 'background:' + (personColors[key] || defaultPersonColor);
      } else {
        label = key;
        stripeStyle = 'background:' + (personColors[key] || defaultPersonColor);
      }
      var addBtn = (viewMode === 'stage' && key !== 'busted') ? '<div class="bb-col-add" onclick="openNewCard(\'' + key + '\')">+</div>' : '';
      colsHTML += '<div class="bb-column"><div class="bb-col-header"><div class="bb-col-stripe" style="' + stripeStyle + ';"></div><span class="bb-col-title">' + label + '</span><span class="bb-col-count">' + groups[key].length + '</span>' + addBtn + '</div><div class="bb-col-cards">';
      groups[key].forEach(function(c) { colsHTML += cardHTML(c, showStage); });
      colsHTML += '</div></div>';
    });
    colsEl.innerHTML = colsHTML;
  }

  // ── VIEW MODE TOGGLE ──
  window.setViewMode = function(mode) {
    viewMode = mode;
    activeTab = null;
    render();
  };

  // ── VIEW SWITCHING ──
  var currentCardId = null;

  // ── RENDER DETAIL VIEW ──
  function renderDetail(cardId) {
    var card = cards.find(function(c) { return c.id === cardId; });
    if (!card) return;

    document.getElementById('bbDetailTitle').textContent = card.title;

    var urgOpts = ['', 'low', 'medium', 'high', 'urgent'];
    var urgLabels = { '': 'None', low: 'Low', medium: 'Medium', high: 'High', urgent: 'Urgent' };
    var stageOpts = stageOrder;

    var urgSelect = urgOpts.map(function(u) {
      return '<option value="' + u + '"' + (u === card.urgency ? ' selected' : '') + '>' + urgLabels[u] + '</option>';
    }).join('');

    var stageSelect = stageOpts.map(function(s) {
      return '<option value="' + s + '"' + (s === card.stage ? ' selected' : '') + '>' + stageLabels[s] + '</option>';
    }).join('');

    var personSelect = '<option value="">Unassigned</option>';
    Object.keys(contactsMap).forEach(function(id) {
      var c = contactsMap[id];
      var sel = c.name === card.person ? ' selected' : '';
      personSelect += '<option value="' + id + '"' + sel + '>' + c.name + '</option>';
    });

    var html = '<div class="bb-detail-top">' +
      '<span class="bb-detail-num">#' + card.id + '</span>' +
      '<span class="bb-state" style="color:' + (stageColors[card.stage] || '#10b981') + '">' + stageLabels[card.stage] + '</span>' +
    '</div>' +
    '<div class="bb-heading">Title</div>' +
    '<input class="bb-edit-input" id="editTitle" value="' + (card.title || '').replace(/"/g, '&quot;') + '">' +
    '<div class="bb-heading">Description</div>' +
    '<textarea class="bb-edit-textarea" id="editDesc">' + (card.desc || '').replace(/</g, '&lt;') + '</textarea>' +
    '<div class="bb-edit-row" style="margin-top:1.5rem">' +
      '<div class="bb-edit-field"><div class="bb-edit-label">Urgency</div><select class="bb-edit-select" id="editUrgency">' + urgSelect + '</select></div>' +
      '<div class="bb-edit-field"><div class="bb-edit-label">Stage</div><select class="bb-edit-select" id="editStage">' + stageSelect + '</select></div>' +
      '<div class="bb-edit-field"><div class="bb-edit-label">Person</div><select class="bb-edit-select" id="editPerson">' + personSelect + '</select></div>' +
    '</div>' +
    '<div class="bb-btn bb-btn--save" onclick="updateCard()" style="margin-top:1.5rem"><div class="bb-btn-indicator bb-btn-indicator--green"></div>Save Changes</div>' +
    '<div class="bb-btn bb-btn--delete" onclick="deleteCard()" style="margin-top:0.5rem"><div class="bb-btn-indicator bb-btn-indicator--red"></div>Delete Buster Card</div>';

    document.getElementById('bbDetailContent').innerHTML = html;
  }

  // ── UPDATE CARD ──
  window.updateCard = async function() {
    if (!currentCardId) return;
    var card = cards.find(function(c) { return c.id === currentCardId; });
    if (!card || !card.dbId) return;

    var title = document.getElementById('editTitle').value.trim();
    if (!title) { showToast('Title is required'); return; }

    var updates = {
      title: title,
      description: document.getElementById('editDesc').value,
      urgency: document.getElementById('editUrgency').value,
      stage: document.getElementById('editStage').value,
      person_id: document.getElementById('editPerson').value || null
    };

    var { error } = await sb.from('cards').update(updates).eq('id', card.dbId);
    if (error) { showToast('Error: ' + error.message); return; }
    showToast('Card #' + currentCardId + ' updated');
    await loadData();
    renderDetail(currentCardId);
  };

  window.showDetail = function(cardId) {
    currentCardId = cardId || null;
    renderDetail(cardId);
    document.getElementById('bbBoard').classList.remove('bb-view--active');
    document.getElementById('bbDetail').classList.add('bb-view--active');
    window.scrollTo(0, 0);
  };
  window.showBoard = function() {
    document.getElementById('bbDetail').classList.remove('bb-view--active');
    document.getElementById('bbBoard').classList.add('bb-view--active');
  };

  // ── COMPLETE STAGE ── (disabled until detail view wired to stages)
  /* document.getElementById('bbCompleteBtn').onclick = function() {
    var nowStage = document.querySelector('.bb-stage--now');
    if (!nowStage) return;
    nowStage.classList.remove('bb-stage--now');
    nowStage.classList.add('bb-stage--done');
    var pill = nowStage.querySelector('.bb-stage-now-pill');
    if (pill) pill.remove();
    var head = nowStage.querySelector('.bb-stage-head');
    if (head) { var d = document.createElement('span'); d.className = 'bb-stage-date'; d.textContent = '6 Apr'; head.insertBefore(d, head.firstChild); }
    var led = nowStage.querySelector('.bb-stage-led');
    if (led) led.removeAttribute('style');
    var next = document.querySelector('.bb-stage--upcoming');
    if (next) {
      next.classList.remove('bb-stage--upcoming');
      next.classList.add('bb-stage--now');
      var np = document.createElement('span'); np.className = 'bb-stage-now-pill'; np.textContent = 'Now';
      next.querySelector('.bb-stage-head').appendChild(np);
      var person = next.querySelector('.bb-stage-person');
      showToast('Stage advanced → ' + (person ? person.textContent : ''));
    } else {
      var state = document.querySelector('.bb-state');
      if (state) { state.textContent = 'Resolved'; state.style.color = '#0098a0'; }
      document.getElementById('bbCompleteBtn').style.display = 'none';
      showToast('All stages complete — Resolved');
    }
  }; */

  function showToast(msg) {
    var old = document.querySelector('.bb-toast');
    if (old) old.remove();
    var t = document.createElement('div'); t.className = 'bb-toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(function() { t.remove(); }, 2200);
  }

  // ── NEW CARD ──

  var newCardStage = 'flagged';

  window.openNewCard = function(stage) {
    newCardStage = stage || 'flagged';
    // Set stage dropdown
    document.getElementById('ncStage').value = newCardStage;
    // Populate person dropdown from contacts
    var sel = document.getElementById('ncPerson');
    sel.innerHTML = '';
    Object.keys(contactsMap).forEach(function(id) {
      var c = contactsMap[id];
      var opt = document.createElement('option');
      opt.value = id;
      opt.textContent = c.name + (c.type === 'external' ? ' (ext)' : '');
      sel.appendChild(opt);
    });
    // Clear form
    document.getElementById('ncTitle').value = '';
    document.getElementById('ncDesc').value = '';
    document.getElementById('ncUrgency').value = 'medium';
    // Show modal
    document.getElementById('bbNewCardModal').classList.add('bb-modal-overlay--open');
  };

  window.closeNewCard = function() {
    document.getElementById('bbNewCardModal').classList.remove('bb-modal-overlay--open');
  };

  window.saveNewCard = async function() {
    var title = document.getElementById('ncTitle').value.trim();
    if (!title) { document.getElementById('ncTitle').focus(); return; }

    var { data, error } = await sb.from('cards').insert({
      title: title,
      description: document.getElementById('ncDesc').value.trim(),
      stage: document.getElementById('ncStage').value,
      person_id: document.getElementById('ncPerson').value,
      urgency: document.getElementById('ncUrgency').value
    }).select();

    if (error) { showToast('Error: ' + error.message); return; }

    closeNewCard();
    showToast('Buster #' + String(data[0].buster_num).padStart(3, '0') + ' created');
    await loadData();
  };

  // ── DELETE CARD ──

  window.deleteCard = async function() {
    if (!currentCardId) { showToast('No card selected'); return; }
    if (!confirm('Delete blockage #' + currentCardId + ' permanently?')) return;
    var cardToDelete = cards.find(function(c) { return c.id === currentCardId; });
    if (cardToDelete && cardToDelete.dbId) {
      var { error } = await sb.from('cards').delete().eq('id', cardToDelete.dbId);
      if (error) { showToast('Error: ' + error.message); return; }
      showToast('Blockage #' + currentCardId + ' deleted');
      currentCardId = null;
      showBoard();
      await loadData();
    }
  };

  // Close modal on overlay click
  document.getElementById('bbNewCardModal').onclick = function(e) {
    if (e.target === this) closeNewCard();
  };

  // ── INIT ──
  loadData();

})();
</script>
<script>document.getElementById('homeBtn').href = location.protocol + '//' + location.hostname;</script>
